    <!-- CSS -->

    <!-- DAISYUI -->

    <main>
        <!-- TOP CONTAINER -->
        <div class="fixed top-0 left-0 w-full h-auto p-4 flex flex-row justify-end items-center">
            <label class="swap swap-rotate">
                <input type="checkbox" class="theme-controller" value="black" />

        </div>

                    <img class="front_content" src="./assets/images/pages/page2.jpg" alt="Página 3">
                </div>
                <div class="back_page">
                    <label for="page1_checkbox"></label>
                    <img class="edge_shading" src="./assets/images/back_page_edge_shading.webp" alt="">
                    <img class="back_content" src="./assets/images/pages/page3.jpg" alt="Página 4">

        <!-- RESPONSIVE WARNING -->

            <div class="modal-box max-w-xs flex flex-col justify-center items-center gap-4 text-center rounded-xl bg-base-300">
